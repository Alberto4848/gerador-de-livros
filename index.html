<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gerador de Livros com IA</title>

<style>
body{
font-family:Arial;
background:#eef2f7;
padding:40px;
}

.box{
background:white;
padding:30px;
max-width:900px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 15px;
margin:5px;
border-radius:6px;
cursor:pointer;
}

textarea{
width:100%;
height:350px;
margin-top:20px;
padding:10px;
}

input{
padding:10px;
width:100%;
}
</style>
</head>

<body>

<div class="box">

<h2>Gerador Profissional de Livros</h2>

<p>Digite o nicho do livro:</p>

<input id="nicho" placeholder="ex: ansiedade">

<br><br>

<button onclick="titulos()">GERAR TÍTULOS</button>
<button onclick="estrutura()">GERAR ESTRUTURA</button>
<button onclick="sinopse()">GERAR SINOPSE</button>
<button onclick="ideias()">50 IDEIAS DE LIVROS</button>

<br>

<button onclick="capitulo()">GERAR CAPÍTULO</button>
<button onclick="capitulolongo()">CAPÍTULO LONGO</button>

<br>

<button onclick="livroIA()">GERAR LIVRO COMPLETO COM IA</button>

<button onclick="copiar()">COPIAR TEXTO</button>

<textarea id="resultado"></textarea>

</div>

<script>

const API_KEY = "AIzaSyBygv83RSjFBWbK1-e3a-RoRubuCCZnfMQ"

function titulos(){
let nicho=document.getElementById("nicho").value
let texto="TÍTULOS DE LIVROS\n\n"
for(let i=1;i<=10;i++){
texto+=i+" Estratégias para vencer "+nicho+"\n"
}
document.getElementById("resultado").value=texto
}

function estrutura(){
let nicho=document.getElementById("nicho").value
let texto="ESTRUTURA DO LIVRO\n\n"
texto+="Introdução\n"
for(let i=1;i<=8;i++){
texto+="Capítulo "+i+" sobre "+nicho+"\n"
}
texto+="Conclusão\n"
document.getElementById("resultado").value=texto
}

function sinopse(){
let nicho=document.getElementById("nicho").value
let texto="SINOPSE\n\n"
texto+="Você sente que "+nicho+" está dominando sua mente?\n\n"
texto+="Neste livro você descobrirá técnicas práticas para recuperar o controle emocional e transformar sua forma de pensar."
document.getElementById("resultado").value=texto
}

function ideias(){
let nicho=document.getElementById("nicho").value
let texto="50 IDEIAS DE LIVROS\n\n"
for(let i=1;i<=50;i++){
texto+=i+" Como lidar com "+nicho+"\n"
}
document.getElementById("resultado").value=texto
}

function capitulo(){
let nicho=document.getElementById("nicho").value
let texto="CAPÍTULO 1\n\n"
texto+="A "+nicho+" é uma reação natural da mente diante de desafios."
document.getElementById("resultado").value=texto
}

function capitulolongo(){
let nicho=document.getElementById("nicho").value
let texto=""
for(let i=0;i<10;i++){
texto+="A "+nicho+" influencia diretamente o comportamento humano.\n\n"
}
document.getElementById("resultado").value=texto
}

async function livroIA(){

let nicho=document.getElementById("nicho").value

document.getElementById("resultado").value="Gerando livro com IA... aguarde"

try{

let resposta = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{
text:"Escreva um ebook completo com introdução, 10 capítulos e conclusão sobre "+nicho
}
]
}
]
})
})

let dados = await resposta.json()

document.getElementById("resultado").value =
dados.candidates[0].content.parts[0].text

}catch(e){

document.getElementById("resultado").value =
"Erro ao gerar texto. Verifique a API."

}

}

function copiar(){

let texto=document.getElementById("resultado")
texto.select()
document.execCommand("copy")
alert("Texto copiado!")

}

</script>

</body>
</html>
