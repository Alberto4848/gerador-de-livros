<!DOCTYPE html>
<html>

<head>

<title>Gerador Profissional de Livros KDP</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
padding:40px;
}

.box{
background:white;
padding:30px;
max-width:900px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
background:#2c7be5;
color:white;
border:none;
padding:10px 15px;
margin:5px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1a5fd1;
}

textarea{
width:100%;
height:400px;
margin-top:20px;
padding:10px;
}

input{
padding:10px;
width:100%;
font-size:16px;
}

</style>

</head>

<body>

<div class="box">

<h2>Gerador Profissional de Livros para Amazon</h2>

<p>Digite o nicho do livro:</p>

<input id="nicho" placeholder="ex: ansiedade">

<br><br>

<button onclick="titulos()">GERAR TÍTULOS</button>
<button onclick="estrutura()">GERAR ESTRUTURA</button>
<button onclick="capitulos()">GERAR CAPÍTULO</button>
<button onclick="sinopse()">GERAR SINOPSE</button>
<button onclick="livro()">GERAR LIVRO BASE</button>

<button onclick="ideias20()">20 IDEIAS DE LIVROS</button>
<button onclick="ideias50()">50 IDEIAS QUE VENDEM</button>

<button onclick="descricao()">DESCRIÇÃO QUE VENDE</button>

<button onclick="livroautomatico()">GERAR LIVRO AUTOMÁTICO</button>

<button onclick="capa()">IDEIA DE CAPA DO LIVRO</button>

<button onclick="copiar()">COPIAR TEXTO</button>

<textarea id="resultado"></textarea>

</div>

<script>

function titulos(){

let nicho=document.getElementById("nicho").value

let texto="TÍTULOS BEST SELLER\n\n"

texto+="1 O Método Definitivo para Superar "+nicho+"\n"
texto+="2 7 Passos Para Vencer a "+nicho+"\n"
texto+="3 Como Eliminar a "+nicho+" da Sua Vida\n"
texto+="4 A Verdade Oculta Sobre a "+nicho+"\n"
texto+="5 O Poder da Transformação Interior\n"

document.getElementById("resultado").value=texto

}



function estrutura(){

let nicho=document.getElementById("nicho").value

let texto="ESTRUTURA DO LIVRO\n\n"

texto+="Introdução\n\n"
texto+="Capítulo 1 Entendendo "+nicho+"\n"
texto+="Capítulo 2 As causas invisíveis\n"
texto+="Capítulo 3 Como a mente reage\n"
texto+="Capítulo 4 O método de transformação\n"
texto+="Capítulo 5 Exercícios práticos\n"
texto+="Capítulo 6 Criando uma nova mentalidade\n\n"
texto+="Conclusão\n"

document.getElementById("resultado").value=texto

}



function capitulos(){

let nicho=document.getElementById("nicho").value

let texto="CAPÍTULO 1\n\n"

texto+="A "+nicho+" é uma das experiências emocionais mais comuns da vida moderna.\n\n"

texto+="Muitas pessoas vivem com pensamentos acelerados, preocupações constantes e sensação de perda de controle.\n\n"

texto+="Neste capítulo vamos compreender como esse processo se forma na mente humana e quais são os primeiros passos para recuperar a tranquilidade interior.\n"

document.getElementById("resultado").value=texto

}



function sinopse(){

let nicho=document.getElementById("nicho").value

let texto="SINOPSE PARA AMAZON\n\n"

texto+="Você sente que a "+nicho+" domina seus pensamentos?\n\n"

texto+="Neste livro você descobrirá métodos práticos para compreender suas emoções, controlar pensamentos e desenvolver uma mente mais tranquila.\n\n"

texto+="Com exemplos simples e exercícios práticos, este guia mostra como transformar sua vida emocional passo a passo.\n"

document.getElementById("resultado").value=texto

}



function livro(){

let nicho=document.getElementById("nicho").value

let texto="INTRODUÇÃO\n\n"

texto+="A "+nicho+" tem se tornado um dos maiores desafios emocionais da vida moderna.\n\n"

texto+="CAPÍTULO 1 Entendendo "+nicho+"\n"
texto+="CAPÍTULO 2 Os gatilhos emocionais\n"
texto+="CAPÍTULO 3 O método de transformação mental\n"
texto+="CAPÍTULO 4 Exercícios práticos\n"
texto+="CAPÍTULO 5 Criando uma mente forte\n"

document.getElementById("resultado").value=texto

}



function ideias20(){

let nicho=document.getElementById("nicho").value

let texto="20 IDEIAS DE LIVROS SOBRE "+nicho+"\n\n"

for(let i=1;i<=20;i++){

texto+=i+" Estratégias práticas para superar "+nicho+"\n"

}

document.getElementById("resultado").value=texto

}



function ideias50(){

let nicho=document.getElementById("nicho").value

let texto="50 IDEIAS DE LIVROS QUE VENDEM SOBRE "+nicho+"\n\n"

for(let i=1;i<=50;i++){

texto+=i+" Como vencer "+nicho+" passo a passo\n"

}

document.getElementById("resultado").value=texto

}



function descricao(){

let nicho=document.getElementById("nicho").value

let texto="DESCRIÇÃO PARA AMAZON\n\n"

texto+="✔ Você sente que a "+nicho+" domina seus pensamentos?\n"
texto+="✔ Quer aprender a controlar emoções?\n\n"

texto+="Este livro revela estratégias práticas para recuperar o equilíbrio emocional e desenvolver uma mente mais tranquila.\n\n"

texto+="Com técnicas simples e aplicáveis no dia a dia, você aprenderá a transformar sua relação com a "+nicho+".\n"

document.getElementById("resultado").value=texto

}



function livroautomatico(){

let nicho=document.getElementById("nicho").value

let texto="LIVRO COMPLETO SOBRE "+nicho+"\n\n"

texto+="INTRODUÇÃO\n\n"

for(let i=1;i<=10;i++){

texto+="CAPÍTULO "+i+" Explorando profundamente "+nicho+"\n"

}

texto+="\nCONCLUSÃO Transformando sua mente e sua vida."

document.getElementById("resultado").value=texto

}



function capa(){

let nicho=document.getElementById("nicho").value

let texto="IDEIA DE CAPA PARA O LIVRO\n\n"

texto+="Título grande sobre "+nicho+"\n\n"

texto+="Imagem principal: pessoa pensativa com luz suave simbolizando transformação emocional.\n\n"

texto+="Cores sugeridas: azul, branco e dourado.\n\n"

texto+="Subtítulo: Como recuperar a paz interior e dominar sua mente."

document.getElementById("resultado").value=texto

}



function copiar(){

let texto=document.getElementById("resultado")

texto.select()

document.execCommand("copy")

alert("Texto copiado!")

}

</script>

</body>

</html>
