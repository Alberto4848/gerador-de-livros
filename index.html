<!DOCTYPE html>
<html>

<head>

<title>Super Gerador de Livros Amazon KDP</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
padding:40px;
}

.box{
background:white;
padding:30px;
max-width:1000px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
background:#2c7be5;
color:white;
border:none;
padding:10px 15px;
margin:5px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1a5fd1;
}

textarea{
width:100%;
height:450px;
margin-top:20px;
padding:10px;
}

input{
padding:10px;
width:100%;
font-size:16px;
}

</style>

</head>

<body>

<div class="box">

<h2>Super Gerador de Livros para Amazon</h2>

<p>Digite o nicho do livro:</p>

<input id="nicho" placeholder="ex: ansiedade">

<br><br>

<button onclick="titulos()">GERAR TÍTULOS</button>

<button onclick="ideias50()">50 IDEIAS DE LIVROS</button>

<button onclick="estrutura()">GERAR ESTRUTURA DO LIVRO</button>

<button onclick="sumario()">GERAR SUMÁRIO PROFISSIONAL</button>

<button onclick="sinopse()">GERAR SINOPSE QUE VENDE</button>

<button onclick="descricao()">GERAR DESCRIÇÃO AMAZON</button>

<button onclick="livro()">GERAR LIVRO COMPLETO</button>

<button onclick="promptIA()">PROMPT PARA IA ESCREVER LIVRO</button>

<button onclick="capa()">IDEIA DE CAPA</button>

<button onclick="copiar()">COPIAR TEXTO</button>

<textarea id="resultado"></textarea>

</div>

<script>

function titulos(){

let nicho=document.getElementById("nicho").value

let texto="TÍTULOS BEST SELLER\n\n"

texto+="1 O Método Definitivo para Superar "+nicho+"\n"
texto+="2 Como Dominar a "+nicho+" em 21 Dias\n"
texto+="3 O Fim da "+nicho+" Passo a Passo\n"
texto+="4 A Verdade Oculta Sobre a "+nicho+"\n"
texto+="5 Mente Forte: Como Controlar a "+nicho+"\n"

document.getElementById("resultado").value=texto

}



function ideias50(){

let nicho=document.getElementById("nicho").value

let texto="50 IDEIAS DE LIVROS SOBRE "+nicho+"\n\n"

for(let i=1;i<=50;i++){

texto+=i+" Estratégias práticas para vencer "+nicho+"\n"

}

document.getElementById("resultado").value=texto

}



function estrutura(){

let nicho=document.getElementById("nicho").value

let texto="ESTRUTURA DO LIVRO\n\n"

texto+="Introdução\n\n"

texto+="Capítulo 1 Entendendo "+nicho+"\n"
texto+="Capítulo 2 As causas invisíveis\n"
texto+="Capítulo 3 O impacto emocional\n"
texto+="Capítulo 4 Mudando padrões mentais\n"
texto+="Capítulo 5 Técnicas práticas\n"
texto+="Capítulo 6 Exercícios diários\n"
texto+="Capítulo 7 Construindo uma mente forte\n"

texto+="\nConclusão\n"

document.getElementById("resultado").value=texto

}



function sumario(){

let nicho=document.getElementById("nicho").value

let texto="SUMÁRIO PROFISSIONAL\n\n"

texto+="Parte 1 – Compreendendo "+nicho+"\n"
texto+="Capítulo 1 A origem emocional\n"
texto+="Capítulo 2 Como o cérebro reage\n"
texto+="Capítulo 3 Gatilhos invisíveis\n\n"

texto+="Parte 2 – Transformação Mental\n"
texto+="Capítulo 4 Mudando pensamentos\n"
texto+="Capítulo 5 Desenvolvendo autocontrole\n"
texto+="Capítulo 6 Reprogramação mental\n\n"

texto+="Parte 3 – Nova Vida\n"
texto+="Capítulo 7 Hábitos mentais saudáveis\n"
texto+="Capítulo 8 Mantendo resultados\n"

document.getElementById("resultado").value=texto

}



function sinopse(){

let nicho=document.getElementById("nicho").value

let texto="SINOPSE DO LIVRO\n\n"

texto+="Você sente que a "+nicho+" controla seus pensamentos?\n\n"

texto+="Este livro revela técnicas práticas para compreender suas emoções, controlar pensamentos negativos e recuperar a tranquilidade interior.\n\n"

texto+="Com estratégias simples e exercícios aplicáveis no dia a dia, você aprenderá a transformar sua mente e viver com mais equilíbrio.\n"

document.getElementById("resultado").value=texto

}



function descricao(){

let nicho=document.getElementById("nicho").value

let texto="DESCRIÇÃO PARA AMAZON\n\n"

texto+="✔ Pensamentos acelerados?\n"
texto+="✔ Preocupação constante?\n"
texto+="✔ Sensação de perda de controle?\n\n"

texto+="Se você enfrenta "+nicho+", este livro apresenta estratégias práticas para recuperar sua paz interior.\n\n"

texto+="Descubra como transformar sua mente e criar uma vida emocional mais equilibrada.\n"

document.getElementById("resultado").value=texto

}



function livro(){

let nicho=document.getElementById("nicho").value

let texto="LIVRO COMPLETO SOBRE "+nicho+"\n\n"

texto+="INTRODUÇÃO\n\n"

for(let i=1;i<=10;i++){

texto+="CAPÍTULO "+i+" Explorando profundamente "+nicho+"\n"

}

texto+="\nCONCLUSÃO Transformando sua mente e sua vida.\n"

document.getElementById("resultado").value=texto

}



function promptIA(){

let nicho=document.getElementById("nicho").value

let texto="PROMPT PARA IA ESCREVER LIVRO COMPLETO\n\n"

texto+="Escreva um livro completo de 80 a 120 páginas sobre "+nicho+".\n\n"

texto+="O livro deve conter:\n"

texto+="Introdução\n"
texto+="10 capítulos detalhados\n"
texto+="exemplos práticos\n"
texto+="exercícios\n"
texto+="explicações profundas\n"
texto+="conclusão inspiradora\n\n"

texto+="O texto deve ser original, bem estruturado e escrito em português do Brasil.\n"

document.getElementById("resultado").value=texto

}



function capa(){

let nicho=document.getElementById("nicho").value

let texto="IDEIA DE CAPA DO LIVRO\n\n"

texto+="Título: Dominando a "+nicho+"\n\n"

texto+="Imagem: pessoa em silêncio olhando o horizonte simbolizando paz mental.\n\n"

texto+="Cores: azul profundo, branco e dourado.\n\n"

texto+="Subtítulo: Como recuperar o controle da mente e viver com tranquilidade.\n"

document.getElementById("resultado").value=texto

}



function copiar(){

let texto=document.getElementById("resultado")

texto.select()

document.execCommand("copy")

alert("Texto copiado!")

}

</script>

</body>

</html>
