<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Gerador de Livros com IA</title>

<style>

body{
font-family:Arial;
background:#f3f4f6;
padding:40px;
}

.container{
background:white;
padding:30px;
max-width:900px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

textarea{
width:100%;
height:400px;
margin-top:20px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>Gerador Automático de Livros com IA</h2>

<label>Tema do Livro</label>

<input id="tema" placeholder="Ex: ansiedade">

<button onclick="gerarLivro()">GERAR LIVRO COMPLETO</button>

<textarea id="resultado"></textarea>

</div>

<script>

async function gerarLivro(){

let tema=document.getElementById("tema").value

let resposta = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=AIzaSyBygv83RSjFBWbK1-e3a-RoRubuCCZnfMQ",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

contents:[{
parts:[{
text:"Escreva um livro completo com introdução, 10 capítulos detalhados e conclusão sobre "+tema+". O texto deve ser longo, educativo e bem estruturado."
}]
}]

})

})

let dados = await resposta.json()

document.getElementById("resultado").value =
dados.candidates[0].content.parts[0].text

}

</script>

</body>
</html>
