<!DOCTYPE html>
<html>
<head>
<title>Gerador de Livros</title>
<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:40px;
}

.box{
background:white;
padding:30px;
max-width:700px;
margin:auto;
border-radius:10px;
}

button{
background:#0066ff;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
}

textarea{
width:100%;
height:350px;
margin-top:20px;
}

</style>
</head>

<body>

<div class="box">

<h2>Gerador de Ideias de Livro</h2>

<p>Digite o nicho do livro:</p>

<input id="nicho">

<br><br>

<button onclick="gerar()">ANALISAR</button>

<textarea id="resultado"></textarea>

</div>

<script>

function gerar(){

let nicho = document.getElementById("nicho").value

let texto = ""

texto += "NICHO: " + nicho + "\n\n"

texto += "TÍTULOS BEST SELLER:\n"
texto += "1 O Poder da Transformação sobre " + nicho + "\n"
texto += "2 7 Métodos Poderosos para Vencer a " + nicho + "\n"
texto += "3 Como Recuperar a Paz Interior e Superar a " + nicho + "\n\n"

texto += "ESTRUTURA DO LIVRO:\n"
texto += "Introdução\n"
texto += "Capítulo 1 Entendendo a " + nicho + "\n"
texto += "Capítulo 2 Os Gatilhos Emocionais\n"
texto += "Capítulo 3 O Método da Mente Calma\n"
texto += "Capítulo 4 Exercícios Práticos\n"
texto += "Capítulo 5 Transformando sua vida\n"
texto += "Conclusão\n\n"

texto += "EXEMPLO DE CAPÍTULO:\n"
texto += "A " + nicho + " é uma reação natural da mente diante de desafios e incertezas da vida moderna. Muitas pessoas convivem diariamente com pensamentos acelerados, preocupação constante e sensação de perda de controle. Neste capítulo vamos compreender como esses processos surgem e como é possível iniciar um caminho de transformação interior.\n"

document.getElementById("resultado").value = texto

}

</script>

</body>
</html>
